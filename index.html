<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Intercambio en la Cabaña</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="bg-[#0b0f19] w-screen h-screen overflow-hidden font-sans relative flex items-center justify-center">

    <section id="pantalla-inicio" class="relative w-screen h-screen overflow-hidden flex items-center justify-center z-50">
        <img src="assets/fondo.png" class="capa-parallax absolute inset-0 w-full h-full object-cover z-0" data-speed="0.002" alt="Fondo estrellado">
        <img src="assets/logo.png" id="logo-sistema" class="absolute top-[3%] left-[20%] -translate-x-1/2 w-[50%] md:w-[35%] z-50 pointer-events-none drop-shadow-[0_10px_10px_rgba(0,0,0,0.8)] logo-respirando" alt="BlindSwap - intercambios">
        <img src="assets/cespedMedio.png" class="capa-parallax absolute inset-0 w-full h-full object-cover object-bottom z-10 pointer-events-none" data-speed="0.005" alt="Césped medio">
        
        <div id="btn-cabana" class="relative z-20 mt-[22vh] cursor-pointer hover:scale-[1.02] transition-transform duration-300 drop-shadow-[0_0_20px_rgba(255,200,0,0.15)] group" data-speed="0.008">            
            <img src="assets/cabana.png" class="w-[95vw] sm:w-[85vw] md:w-[75vw] lg:w-[65vw] xl:w-[60vw] max-h-[80vh] object-contain" alt="Cabaña en el bosque">
            <p class="absolute -top-12 left-1/2 -translate-x-1/2 text-white font-mono text-sm opacity-0 group-hover:opacity-100 transition-opacity duration-300 whitespace-nowrap bg-black/60 px-3 py-1 rounded border border-white/20">
                Haz clic para entrar
            </p>
        </div>

        <img src="assets/cespedFrente.png" class="capa-parallax absolute inset-0 w-full h-full object-cover object-bottom z-30 pointer-events-none" data-speed="0.015" alt="Césped frente">
    </section>

    <div id="fade-overlay" class="fixed inset-0 bg-black opacity-0 pointer-events-none z-[100] transition-opacity duration-1000"></div>

    <div id="escena-cabana" class="hidden relative w-screen h-screen overflow-hidden flex items-center justify-center z-10 bg-[#120e0a]">
        
        <img src="assets/fondo-wide.png" class="absolute inset-0 w-full h-full object-cover z-0" alt="Fondo de Cabaña">

        <main class="relative w-full max-w-[1920px] aspect-video z-10">
            
            <img src="assets/fogata.png" class="fuego-vivo absolute top-[-10%] left-1/2 -translate-x-1/2 w-[40%] z-10" alt="Hoguera">

            <div class="absolute top-[5%] right-[4%] w-[25%] h-[30%] z-5 flex justify-center items-center gap-4 pointer-events-auto">
                <img src="assets/poster1.png" id="poster1" class="poster-musical group active:scale-95 transition-transform drop-shadow-[0_5px_5px_rgba(0,0,0,0.5)]" alt="Canción 1">
                <img src="assets/poster2.png" id="poster2" class="poster-musical group active:scale-95 transition-transform drop-shadow-[0_5px_5px_rgba(0,0,0,0.5)]" alt="Canción 2">
                <img src="assets/poster3.png" id="poster3" class="poster-musical group active:scale-95 transition-transform drop-shadow-[0_5px_5px_rgba(0,0,0,0.5)]" alt="Canción 3">
                <img src="assets/poster4.png" id="poster4" class="poster-musical group active:scale-95 transition-transform drop-shadow-[0_5px_5px_rgba(0,0,0,0.5)]" alt="Canción 4">
            </div>

            <img src="assets/sofa.png" class="absolute top-[18%] left-[-5%] w-[45%] z-20" alt="Sillón naranja">
            
            <img src="assets/puff-derecha.png" class="absolute top-[30%] right-[6%] w-[34%] z-20" alt="Puff verde">
            
            <img src="assets/mesa-con-lampara.png" class="lampara-viva absolute top-[43%] right-[2%] w-[14%] z-30" alt="Mesita con lámpara">

            <div id="gato-interactivo" class="absolute bottom-[-10%] w-[35%] z-30 group cursor-pointer">
                <img src="assets/puff-gato.png" class="w-full h-auto transition-transform duration-300 group-hover:scale-[1.02] drop-shadow-lg" alt="Gato durmiendo">
                <img src="assets/dialogoGato.png" class="absolute -top-[40%] left-[50%] w-[70%] opacity-0 transition-all duration-300 group-hover:opacity-100 group-hover:-translate-y-3 pointer-events-none drop-shadow-md z-40" alt="Diálogo del gato">
            </div>

            <img src="assets/madejas.png" class="absolute bottom-[20%] right-[15%] w-[12%] z-30" alt="Canasta de hilos">

            <div id="contenedor-mesa" class="absolute bottom-[2%] left-1/2 -translate-x-1/2 w-[30%] z-40 group">
                <img src="assets/mesa-central.png" id="mesa-trigger" class="w-fill h-auto object-contain transition-transform duration-300 drop-shadow-2xl hover:scale-105 cursor-pointer" alt="Mesa con libreta">
                <img src="assets/sobres.png" id="sobres-trigger" class="hidden absolute bottom-[65%] left-[52%] -translate-x-1/2 w-[35%] z-50 cursor-pointer hover:scale-110 hover:-translate-y-2 transition-all duration-300 drop-shadow-[0_10px_10px_rgba(0,0,0,0.5)]" alt="Sobres de resultados">
            </div>

        </main>
    </div>

    <section id="ui-intercambio" class="absolute inset-0 z-50 hidden opacity-0 transition-opacity duration-1000 flex items-center justify-center p-4">
    </section>

    <div id="modal-libreta" class="fixed inset-0 z-50 hidden items-center justify-center bg-black/85 font-mono transition-opacity duration-500 opacity-0 backdrop-blur-sm overflow-y-auto overflow-x-hidden p-4">
        
        <div id="vaso-externo" class="absolute bottom-2 lg:bottom-auto lg:right-[5%] xl:right-[10%] left-1/2 lg:left-auto transform -translate-x-1/2 lg:translate-x-0 top-auto lg:top-1/2 lg:-translate-y-1/2 hidden flex-col items-center z-[100] transition-all duration-1000 opacity-0 drop-shadow-[10px_10px_0_rgba(0,0,0,0.6)] scale-[0.65] sm:scale-75 lg:scale-100">
            
            <div class="bg-[#facc15] border-4 border-black px-4 py-1 mb-6 relative shadow-[4px_4px_0_#000]">
                <div class="absolute top-1 left-1 w-1.5 h-1.5 bg-black"></div>
                <div class="absolute top-1 right-1 w-1.5 h-1.5 bg-black"></div>
                <div class="absolute bottom-1 left-1 w-1.5 h-1.5 bg-black"></div>
                <div class="absolute bottom-1 right-1 w-1.5 h-1.5 bg-black"></div>
                <h3 class="text-black font-black uppercase tracking-widest text-sm relative z-10">Vasito</h3>
            </div>
            
            <div id="vaso-dropzone" class="w-40 h-56 bg-[#60a5fa] border-4 border-black relative flex flex-wrap-reverse content-start justify-center p-3 overflow-visible shadow-[8px_8px_0_#000,inset_-10px_-10px_0_rgba(30,58,138,0.4)] transition-transform duration-200">
                
                <div class="absolute -top-4 -left-2 -right-2 h-4 bg-[#3b82f6] border-4 border-black z-20 pointer-events-none">
                    <div class="absolute top-0 left-1 w-20 h-1 bg-white/50"></div>
                </div>
                
                <div class="absolute top-3 left-2 w-3 h-28 bg-white/60 pointer-events-none z-10"></div>
                <div class="absolute top-36 left-2 w-3 h-6 bg-white/60 pointer-events-none z-10"></div>
                
                <div class="absolute inset-0 flex items-center justify-center pointer-events-none opacity-40 font-black uppercase text-center text-2xl tracking-widest text-black z-0 leading-none">
                    DROP<br>
                </div>
            </div>
        </div>

        <div id="contenedor-libro" class="perspective-[2500px] w-full flex justify-center items-center relative z-10 scale-[0.45] sm:scale-[0.60] md:scale-[0.75] lg:scale-[0.90] xl:scale-100 transition-all duration-500 origin-center">
            <div id="el-libro" class="relative w-[320px] sm:w-[380px] h-[500px] ...">
                
                <div id="trigger-abrir" class="absolute inset-0 z-50"></div>

                <div id="el-lapiz" class="absolute -top-12 left-1/2 -translate-x-1/2 w-40 h-8 z-50 transition-opacity duration-500 pointer-events-none">
                    <div class="absolute inset-x-4 top-1 bottom-1 bg-[#facc15] border-4 border-black shadow-[4px_4px_0px_rgba(0,0,0,1)]"></div>
                    <div class="absolute left-0 top-1/2 -translate-y-1/2 w-4 h-4 bg-[#e9c4a6] border-4 border-black rotate-45"></div>
                    <div class="absolute -left-1 top-1/2 -translate-y-1/2 w-2 h-2 bg-black border-2 border-black rotate-45"></div>
                    <div class="absolute right-0 top-1 bottom-1 w-5 bg-red-400 border-4 border-black border-l-0"></div>
                    <div class="absolute right-4 top-1 bottom-1 w-2 bg-slate-400 border-4 border-black border-l-0 border-r-0"></div>
                </div>

                <div id="la-flecha" class="absolute -right-24 top-1/2 -translate-y-1/2 animate-bounce-horizontal transition-opacity duration-500 pointer-events-none">
                    <svg width="60" height="60" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <path d="M4 11H16V7L22 12L16 17V13H4V11Z" fill="#ffda75" stroke="black" stroke-width="2"/>
                    </svg>
                </div>

                <div class="absolute inset-0 bg-[#c7ba98] border-4 border-black translate-x-6 translate-y-6 shadow-[12px_12px_0px_rgba(0,0,0,1)] z-0"></div>
                <div class="absolute inset-0 bg-[#d8cba8] border-4 border-black translate-x-4 translate-y-4 z-0"></div>
                <div class="absolute inset-0 bg-[#e6dbbd] border-4 border-black translate-x-2 translate-y-2 z-0"></div>
                
                <div class="absolute -bottom-10 left-16 w-6 h-16 bg-red-700 border-4 border-black shadow-[4px_4px_0px_rgba(0,0,0,1)] z-0">
                    <div class="absolute bottom-0 left-0 right-0 h-4 bg-red-900"></div>
                </div>

                <div id="pagina-derecha" class="absolute inset-0 bg-[#f4ebd0] border-4 border-black p-3 sm:p-6 z-10 flex flex-col shadow-[inset_15px_0_20px_-10px_rgba(0,0,0,0.2)]">
                    <h2 class="text-xl font-bold text-black mb-4 border-b-4 border-black pb-2 uppercase tracking-widest text-center">Organizador</h2>
                    
                    <div class="flex-grow flex flex-col justify-center gap-4">
                        
                        <div>
                            <label class="block text-black font-bold uppercase text-sm mb-1">Nombre del Sorteo</label>
                            <input type="text" id="nombre-evento" class="w-full bg-white border-4 border-black p-2 text-md focus:outline-none focus:bg-[#ffffe0] transition-colors shadow-[inset_4px_4px_0_rgba(0,0,0,0.1)]" placeholder="Ej. Posada 2026">
                        </div>

                        <div>
                            <label class="block text-black font-bold uppercase text-sm mb-1">¿Quién organiza?</label>
                            <input type="text" id="nombre-organizador" class="w-full bg-white border-4 border-black p-2 text-md focus:outline-none focus:bg-[#ffffe0] transition-colors shadow-[inset_4px_4px_0_rgba(0,0,0,0.1)]" placeholder="Tu nombre...">
                        </div>
                        
                        <label class="flex items-center space-x-3 text-black cursor-pointer bg-white p-2 border-4 border-black hover:bg-[#e0f0ff] transition-colors shadow-[4px_4px_0px_rgba(0,0,0,1)] active:shadow-none active:translate-x-1 active:translate-y-1 mt-2">
                            <input type="checkbox" id="participa-organizador" class="w-6 h-6 accent-black cursor-pointer">
                            <span class="font-bold text-sm uppercase">También participo</span>
                        </label>
                    </div>
                    
                    <div class="flex flex-wrap justify-center gap-2 mt-6 pt-4 border-t-4 border-black">
                        <button id="btn-cerrar" class="px-4 py-2 bg-gray-400 text-black border-4 border-black font-bold uppercase hover:bg-gray-500 hover:translate-y-1 transition-transform shadow-[4px_4px_0px_rgba(0,0,0,1)] hover:shadow-none text-xs sm:text-sm">Cerrar</button>
                        <button id="btn-siguiente" class="px-4 py-2 bg-[#4ade80] text-black border-4 border-black font-bold uppercase hover:bg-[#22c55e] hover:translate-y-1 transition-transform shadow-[4px_4px_0px_rgba(0,0,0,1)] hover:shadow-none text-xs sm:text-sm">Guardar</button>
                        <button id="btn-reiniciar-todo" class="px-4 py-2 bg-red-600 text-white border-4 border-black font-bold uppercase hover:bg-red-700 hover:translate-y-1 transition-transform shadow-[4px_4px_0px_rgba(0,0,0,1)] hover:shadow-none text-xs sm:text-sm">Reiniciar Todo</button>
                    </div>
                </div>

                <div class="hoja-extra-2 absolute inset-0 origin-left bg-[#e6dbbd] border-4 border-black z-20 transition-transform duration-[1.4s] ease-in-out preserve-3d"></div>
                <div class="hoja-extra-1 absolute inset-0 origin-left bg-[#eee4ca] border-4 border-black z-30 transition-transform duration-[1.3s] ease-in-out preserve-3d"></div>

                <div class="portada-principal absolute inset-0 origin-left z-40 transition-transform duration-[1.2s] ease-in-out preserve-3d">
                    <div class="absolute inset-0 bg-[#4e342e] border-4 border-black flex flex-col items-center justify-center backface-hidden">
                        <div class="absolute left-0 top-0 bottom-0 w-8 bg-[#3e2723] border-r-4 border-black"></div>
                        <div class="border-4 border-black bg-[#5d4037] p-6 text-center w-4/5 shadow-[inset_4px_4px_0px_rgba(255,255,255,0.1)]">
                            <h1 class="text-3xl font-bold text-[#ffda75] mb-2 uppercase tracking-widest drop-shadow-[3px_3px_0px_rgba(0,0,0,1)]">Intercambio</h1>
                            <p class="text-white text-xl font-bold drop-shadow-[2px_2px_0px_rgba(0,0,0,1)]">2026</p>
                        </div>
                    </div>

                    <div id="pagina-izquierda" class="absolute inset-0 bg-[#f4ebd0] border-4 border-black p-3 sm:p-6 flex flex-col backface-hidden rotar-reverso shadow-[inset_-15px_0_20px_-10px_rgba(0,0,0,0.2)]">
                        <h2 class="text-2xl font-bold text-black border-b-4 border-black pb-2 mb-6 uppercase tracking-wider text-center">Registro</h2>
                        <p class="text-black text-sm leading-relaxed uppercase bg-white/50 p-4 border-4 border-black shadow-[inset_4px_4px_0_rgba(0,0,0,0.1)]">
                            Bienvenido. Rellena los datos de la página derecha para comenzar.
                        </p>
                        <div class="mt-auto text-center border-4 border-black bg-white p-2">
                            <p class="text-xs font-bold uppercase">Librito de:</p>
                            <p class="text-xs uppercase">- Emiliano Alejandro Santos González</p>
                            <p class="text-xs uppercase">- Harim Jesús Enrique Dueñas Dávila</p>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <div id="modal-calendario" class="fixed inset-0 z-[60] hidden items-center justify-center bg-black/40 backdrop-blur-sm transition-opacity duration-500 opacity-0">
            <div id="calendario-pixel" class="bg-[#f4ebd0] border-4 border-black p-4 shadow-[15px_15px_0_rgba(0,0,0,1)] w-80 transform scale-75 transition-transform duration-500 font-mono relative overflow-hidden">
            
            <div class="flex justify-between items-center bg-black text-[#ffda75] p-2 mb-4 border-4 border-black">
                <button id="cal-prev" class="hover:text-white px-3 cursor-pointer font-extrabold text-lg hover:scale-110 active:translate-y-1 transition-all">&lt;</button>
                
                <button id="cal-mes-ano" class="font-bold uppercase tracking-widest text-sm hover:text-white hover:scale-105 active:scale-95 transition-all cursor-pointer" title="Cambiar mes y año">MARZO 2026</button>
                
                <button id="cal-next" class="hover:text-white px-3 cursor-pointer font-extrabold text-lg hover:scale-110 active:translate-y-1 transition-all">&gt;</button>
            </div>
            
            <div class="grid grid-cols-7 gap-1 text-center font-bold text-xs uppercase mb-2 text-black">
                <div>Do</div><div>Lu</div><div>Ma</div><div>Mi</div><div>Ju</div><div>Vi</div><div>Sa</div>
            </div>
            
            <div id="cal-dias" class="grid grid-cols-7 gap-1 text-center text-sm">
                </div>
            
            <div class="mt-4 pt-4 border-t-4 border-black flex justify-center">
                <button id="btn-cerrar-calendario" class="w-full bg-red-500 text-white border-4 border-black px-4 py-2 font-bold uppercase hover:bg-red-600 shadow-[4px_4px_0_#000] active:translate-y-1 active:shadow-none text-xs transition-all tracking-widest">Regresar al Libro</button>
            </div>

            <div id="mini-modal-mes-ano" class="absolute inset-0 bg-black/80 flex flex-col items-center justify-center hidden opacity-0 transition-opacity duration-300 z-50 p-6">
                <div class="bg-[#f4ebd0] border-4 border-black p-4 w-full shadow-[8px_8px_0_rgba(0,0,0,1)] text-center">
                    <h4 class="text-black font-bold uppercase mb-4 text-xs tracking-widest border-b-4 border-black pb-2">Ir a fecha</h4>
                    
                    <select id="select-mes-rapido" class="w-full bg-white border-4 border-black p-2 mb-3 font-mono text-sm focus:outline-none cursor-pointer hover:bg-[#ffffe0]">
                        <option value="0">Enero</option><option value="1">Febrero</option><option value="2">Marzo</option>
                        <option value="3">Abril</option><option value="4">Mayo</option><option value="5">Junio</option>
                        <option value="6">Julio</option><option value="7">Agosto</option><option value="8">Septiembre</option>
                        <option value="9">Octubre</option><option value="10">Noviembre</option><option value="11">Diciembre</option>
                    </select>
                    
                    <input type="number" id="input-ano-rapido" class="w-full bg-white border-4 border-black p-2 mb-4 font-mono text-sm focus:outline-none text-center hover:bg-[#ffffe0]" value="2026">
                    
                    <div class="flex gap-2">
                        <button id="btn-cancelar-salto" class="flex-1 bg-gray-400 text-black border-4 border-black font-bold uppercase text-xs py-2 hover:bg-gray-500 shadow-[2px_2px_0_#000] active:translate-y-1 active:shadow-none transition-all">Atrás</button>
                        <button id="btn-aplicar-salto" class="flex-1 bg-[#4ade80] text-black border-4 border-black font-bold uppercase text-xs py-2 hover:bg-[#22c55e] shadow-[2px_2px_0_#000] active:translate-y-1 active:shadow-none transition-all">Ir</button>
                    </div>
                </div>
            </div>
        </div>
        </div>

    </div>

    <script src="js/storage.js"></script>
    <script src="js/dragdrop.js"></script>
    <script src="js/sorteo.js"></script>
    <script src="js/main.js"></script>
    <script src="js/participantes.js"></script>
    <script src="js/calendario_presupuesto.js"></script>
    <script src="js/exclusiones.js"></script>
</body>
</html>
